name: Build site

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker image
        uses: actions/cache@v5
        with:
          path: /tmp/docker-image.tar
          key: docker-${{ hashFiles('Dockerfile', 'Gemfile', 'Gemfile.lock') }}

      - name: Load cached image or build
        run: |
          if [ -f /tmp/docker-image.tar ]; then
            docker load < /tmp/docker-image.tar
          else
            docker build -t ceylon-site .
            docker save ceylon-site > /tmp/docker-image.tar
          fi

      - name: Build site
        run: just build

      - name: Fix permissions
        run: sudo chown -R $(id -u):$(id -g) _site

      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: _site/

      - name: Deploy to branch
        run: |
          cd _site
          git init
          git checkout -b deploy
          git add .
          git -c user.name="github-actions" -c user.email="github-actions@github.com" commit -m "Deploy site"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" deploy
